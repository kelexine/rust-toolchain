name: Sync Latest Rust Stable

# Runs on the 1st and 15th of every month at 02:00 UTC
# Also manually triggerable with optional version override
on:
  schedule:
    - cron: "0 2 1 * *"   # 1st of month
    - cron: "0 2 15 * *"  # 15th of month
  workflow_dispatch:
    inputs:
      version:
        description: "Rust version to pack (leave empty to auto-detect latest stable)"
        required: false
        default: ""
      force:
        description: "Force repack even if version already exists"
        required: false
        default: "false"
        type: boolean

permissions:
  contents: write

jobs:
  sync:
    name: Sync Rust Toolchain
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Checkout ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Resolve latest stable version ─────────────────────────────────────────
      - name: Resolve Rust stable version
        id: resolve
        run: |
          if [[ -n "${{ github.event.inputs.version }}" ]]; then
            # Sanitize: extract only X.Y.Z in case the user pastes a full
            # "rustc --version" string like "1.94.1 (e408947bf 2026-03-25)"
            RAW_INPUT="${{ github.event.inputs.version }}"
            VERSION=$(echo "$RAW_INPUT" | grep -oP '\d+\.\d+\.\d+' | head -1)
            if [[ -z "$VERSION" ]]; then
              echo "ERROR: could not parse a valid semver from input: $RAW_INPUT"
              exit 1
            fi
            echo "Using manually specified version: $VERSION (raw input: $RAW_INPUT)"
          else
            echo "Fetching latest stable from rust-lang.org..."
            # Parse channel-rust-stable.toml anchored to the [pkg.rust] section
            # to avoid false matches from other component version fields.
            # The version field value looks like: "1.94.1 (e408947bf 2026-03-25)"
            # — we extract only the leading X.Y.Z semver, discarding the commit
            # hash suffix, which is not part of the dist filename.
            TOML=$(curl -fsSL "https://static.rust-lang.org/dist/channel-rust-stable.toml")
            RAW_VERSION=$(echo "$TOML" \
              | awk '/^\[pkg\.rust\]/{found=1} found && /^version =/{print; exit}' \
              | sed 's/version = "\(.*\)"/\1/')
            VERSION=$(echo "$RAW_VERSION" | grep -oP '^\d+\.\d+\.\d+')
            if [[ -z "$VERSION" ]]; then
              echo "ERROR: could not parse semver from channel-rust-stable.toml"
              echo "  Raw value was: $RAW_VERSION"
              exit 1
            fi
            echo "Resolved latest stable: $VERSION (raw: $RAW_VERSION)"
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Check if this version is already packed
          MANIFEST="toolchains/$VERSION/manifest.json"
          if [[ -f "$MANIFEST" && "${{ github.event.inputs.force }}" != "true" ]]; then
            echo "already_exists=true" >> "$GITHUB_OUTPUT"
            echo "Version $VERSION already packed. Skipping."
          else
            echo "already_exists=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Skip if already exists ────────────────────────────────────────────────
      - name: Skip if already packed
        if: steps.resolve.outputs.already_exists == 'true'
        run: |
          echo "✅ Rust ${{ steps.resolve.outputs.version }} already exists in this repo. Nothing to do."

      # ── Download toolchain ────────────────────────────────────────────────────
      - name: Download Rust toolchain
        if: steps.resolve.outputs.already_exists == 'false'
        id: download
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          TARGET="x86_64-unknown-linux-gnu"
          FILENAME="rust-${VERSION}-${TARGET}.tar.xz"
          URL="https://static.rust-lang.org/dist/${FILENAME}"
          SHA_URL="${URL}.sha256"

          echo "Downloading $FILENAME..."
          curl -fL --progress-bar "$URL" -o "/tmp/$FILENAME"

          echo "Downloading checksum..."
          curl -fsSL "$SHA_URL" -o "/tmp/${FILENAME}.sha256"

          echo "Verifying upstream checksum..."
          EXPECTED=$(awk '{print $1}' "/tmp/${FILENAME}.sha256")
          ACTUAL=$(sha256sum "/tmp/$FILENAME" | awk '{print $1}')

          if [[ "$EXPECTED" != "$ACTUAL" ]]; then
            echo "❌ Checksum mismatch! Expected: $EXPECTED  Got: $ACTUAL"
            exit 1
          fi

          echo "✅ Checksum verified: $ACTUAL"
          echo "sha256=$ACTUAL"   >> "$GITHUB_OUTPUT"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"
          echo "target=$TARGET"   >> "$GITHUB_OUTPUT"

      # ── Split into chunks ─────────────────────────────────────────────────────
      - name: Split into 90MB chunks
        if: steps.resolve.outputs.already_exists == 'false'
        id: split
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          FILENAME="${{ steps.download.outputs.filename }}"
          OUT_DIR="toolchains/$VERSION"

          mkdir -p "$OUT_DIR"

          echo "Splitting /tmp/$FILENAME into 90M chunks..."
          split \
            --bytes=90M \
            --numeric-suffixes \
            --suffix-length=3 \
            "/tmp/$FILENAME" \
            "$OUT_DIR/rust-${VERSION}.tar.xz.part"

          CHUNK_COUNT=$(find "$OUT_DIR" -name "rust-${VERSION}.tar.xz.part*" | wc -l)
          echo "Created $CHUNK_COUNT chunks"
          echo "chunk_count=$CHUNK_COUNT" >> "$GITHUB_OUTPUT"
          ls -lh "$OUT_DIR"/

      # ── Write manifest ────────────────────────────────────────────────────────
      - name: Write manifest.json
        if: steps.resolve.outputs.already_exists == 'false'
        id: manifest
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          TARGET="${{ steps.download.outputs.target }}"
          SHA256="${{ steps.download.outputs.sha256 }}"
          OUT_DIR="toolchains/$VERSION"
          CHUNK_COUNT="${{ steps.split.outputs.chunk_count }}"
          DATE=$(date -u +%Y-%m-%d)

          # Write without heredoc indentation so JSON is not prefixed with spaces
          cat > "$OUT_DIR/manifest.json" <<-MANIFEST
          {
            "version": "$VERSION",
            "target": "$TARGET",
            "date": "$DATE",
            "sha256": "$SHA256",
            "chunks": $CHUNK_COUNT,
            "chunk_size": "90M",
            "source": "https://static.rust-lang.org/dist/rust-${VERSION}-${TARGET}.tar.xz",
            "packed_by": "kelexine/rust-toolchain GitHub Actions"
          }
          MANIFEST

          # Strip the leading whitespace artifact from the tab-indented heredoc
          python3 -c "
          import json, sys
          with open('$OUT_DIR/manifest.json') as f:
              data = json.load(f)
          with open('$OUT_DIR/manifest.json', 'w') as f:
              json.dump(data, f, indent=2)
              f.write('\n')
          "

          # Standalone sha256 file (for verify.sh)
          echo "$SHA256  rust-${VERSION}.tar.xz" > "$OUT_DIR/rust-${VERSION}.tar.xz.sha256"

          echo "Manifest written:"
          cat "$OUT_DIR/manifest.json"
          echo "date=$DATE"       >> "$GITHUB_OUTPUT"

      # ── Update stable symlink ──────────────────────────────────────────────────
      - name: Update stable symlink
        if: steps.resolve.outputs.already_exists == 'false'
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          rm -f stable
          ln -s "toolchains/$VERSION" stable
          echo "stable -> toolchains/$VERSION"

      # ── Update README metadata ─────────────────────────────────────────────────
      - name: Update README metadata
        if: steps.resolve.outputs.already_exists == 'false'
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          TARGET="${{ steps.download.outputs.target }}"
          SHA256="${{ steps.download.outputs.sha256 }}"
          DATE="${{ steps.manifest.outputs.date }}"
          CHUNK_COUNT="${{ steps.split.outputs.chunk_count }}"
          CHUNK_SIZE="90M"
          CHUNK_LABEL="${CHUNK_COUNT} x ${CHUNK_SIZE}"

          # Build replacement metadata block
          NEW_META="<!-- stable-metadata-start -->
          - **Platform:** \`${TARGET}\`
          - **Current stable:** \`${VERSION}\`
          - **Release date:** \`${DATE}\`
          - **SHA-256:** \`${SHA256}\`
          - **Chunks:** \`${CHUNK_LABEL}\`
          <!-- stable-metadata-end -->"

          # Build replacement repo tree block
          NEW_TREE="<!-- repo-tree-start -->
          \`\`\`
          rust-toolchain/
          ├── README.md
          ├── install.sh              <- main entry point (run this)
          ├── uninstall.sh            <- clean removal
          ├── verify.sh               <- sha256 integrity check
          ├── pack.sh                 <- [local] package a toolchain for upload
          ├── toolchains/
          │   └── ${VERSION}/
          │       ├── manifest.json   <- metadata: version, date, sha256, chunk count
          │       ├── rust-${VERSION}.tar.xz.sha256
          │       ├── rust-${VERSION}.tar.xz.part000
          │       ├── rust-${VERSION}.tar.xz.part001
          │       └── ...             <- 90MB chunks (GitHub <100MB limit)
          └── stable -> toolchains/${VERSION}   <- symlink to current stable
          \`\`\`
          <!-- repo-tree-end -->"

          # Use python3 (always available on ubuntu-latest) for robust multiline
          # block replacement — avoids sed/awk quoting issues with backticks and
          # special chars in the tree block.
          python3 - <<-PYEOF
          import re

          with open('README.md', 'r') as f:
              content = f.read()

          meta = """${NEW_META}"""
          tree = """${NEW_TREE}"""

          # Replace metadata block
          content = re.sub(
              r'<!-- stable-metadata-start -->.*?<!-- stable-metadata-end -->',
              meta,
              content,
              flags=re.DOTALL
          )

          # Replace tree block
          content = re.sub(
              r'<!-- repo-tree-start -->.*?<!-- repo-tree-end -->',
              tree,
              content,
              flags=re.DOTALL
          )

          with open('README.md', 'w') as f:
              f.write(content)

          print("README.md updated successfully")
          PYEOF

      # ── Commit and push ────────────────────────────────────────────────────────
      - name: Commit and push
        if: steps.resolve.outputs.already_exists == 'false'
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage toolchain chunks, stable symlink, and updated README
          git add "toolchains/$VERSION/" stable README.md
          git commit -m "chore: add Rust $VERSION toolchain [$(date -u +%Y-%m-%d)]"
          git push

          echo "✅ Rust $VERSION committed and pushed."

      # ── Summary ───────────────────────────────────────────────────────────────
      - name: Job summary
        run: |
          VERSION="${{ steps.resolve.outputs.version }}"
          if [[ "${{ steps.resolve.outputs.already_exists }}" == "true" ]]; then
            echo "## ✅ No update needed" >> "$GITHUB_STEP_SUMMARY"
            echo "Rust **$VERSION** was already present in the repository." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## 🦀 Rust $VERSION packed and pushed" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Version:** $VERSION" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Target:** x86_64-unknown-linux-gnu" >> "$GITHUB_STEP_SUMMARY"
            echo "- **SHA-256:** ${{ steps.download.outputs.sha256 }}" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Chunks:** ${{ steps.split.outputs.chunk_count }} × 90M" >> "$GITHUB_STEP_SUMMARY"
            echo "- **Triggered by:** ${{ github.event_name }}" >> "$GITHUB_STEP_SUMMARY"
          fi
